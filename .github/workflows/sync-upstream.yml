name: Sync Upstream Docs

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync (usually main)'
        required: true
        default: 'main'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Upstream and Sync
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          echo "Adding upstream remote..."
          git remote add upstream https://github.com/FlowiseAI/FlowiseDocs.git
          git fetch upstream
          
          echo "Merging upstream updates..."
          git merge upstream/${{ github.event.inputs.branch }} --allow-unrelated-histories -m "Merge upstream updates"
          
          echo "Pushing changes back to repository..."
          git push origin HEAD
